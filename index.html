<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindSpark Daily</title>
  <meta name="description" content="Щоденна доза натхнення — перевірені наукові факти, мудрість і відкриття великих мислителів." />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f9f8f5;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.14);
  --text: #1a1a18;
  --text-2: #5a5a56;
  --text-3: #9a9a94;
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --accent-border: #bfdbfe;
  --accent-text: #1d4ed8;
  --success: #16a34a;
  --success-bg: #f0fdf4;
  --success-border: #bbf7d0;
  --success-text: #15803d;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --danger-border: #fecaca;
  --danger-text: #b91c1c;
  --purple-bg: #f5f3ff;
  --purple-border: #ddd6fe;
  --purple-text: #6d28d9;
  --amber-bg: #fffbeb;
  --amber-border: #fde68a;
  --amber-text: #92400e;
  --pink-bg: #fdf2f8;
  --pink-border: #fbcfe8;
  --pink-text: #9d174d;
  --green-bg: #f0fdf4;
  --green-border: #bbf7d0;
  --green-text: #166534;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  --font: system-ui, -apple-system, sans-serif;
  --font-serif: 'Lora', Georgia, serif;
  --grad: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ===== UTILITIES ===== */
.hidden { display: none !important; }
.container { max-width: 720px; margin: 0 auto; padding: 0 20px; }

/* ===== TOAST ===== */
.toast {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; z-index: 9999;
  white-space: nowrap; pointer-events: none;
  animation: toastIn 0.25s ease;
  box-shadow: var(--shadow-lg);
}
.toast.success { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
.toast.error { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-border); }
.toast.info { background: var(--accent-bg); color: var(--accent-text); border: 1px solid var(--accent-border); }
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* ===== HEADER ===== */
.header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 960px; margin: 0 auto; padding: 0 20px;
  height: 62px; display: flex; align-items: center; justify-content: space-between;
}
.logo-btn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.logo-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--grad);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 17px; flex-shrink: 0;
}
.logo-icon.large { width: 52px; height: 52px; border-radius: 14px; font-size: 24px; }
.logo-text { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -0.4px; }
.header-nav { display: flex; align-items: center; gap: 8px; }
.nav-group { display: flex; align-items: center; gap: 8px; }

/* ===== BUTTONS ===== */
.btn-primary {
  background: var(--grad); color: #fff; border: none; cursor: pointer;
  padding: 8px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 600;
  font-family: var(--font); transition: opacity 0.15s, transform 0.1s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { transform: scale(0.98); }
.btn-primary.full { width: 100%; justify-content: center; padding: 12px; font-size: 15px; }

.btn-outline {
  background: none; border: 1px solid var(--border-strong); cursor: pointer;
  color: var(--text); padding: 8px 14px; border-radius: var(--radius);
  font-size: 14px; font-weight: 500; font-family: var(--font);
  transition: background 0.15s;
}
.btn-outline:hover { background: var(--surface2); }

.btn-back {
  background: var(--surface); border: 1px solid var(--border); cursor: pointer;
  width: 38px; height: 38px; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); font-size: 18px; flex-shrink: 0;
  transition: background 0.15s;
}
.btn-back:hover { background: var(--surface2); }

.btn-danger {
  background: var(--danger-bg); border: 1px solid var(--danger-border);
  color: var(--danger-text); cursor: pointer; padding: 12px 20px; border-radius: var(--radius-lg);
  font-size: 14px; font-weight: 600; font-family: var(--font);
  display: flex; align-items: center; gap: 8px; width: 100%;
  transition: opacity 0.15s;
}
.btn-danger:hover { opacity: 0.85; }

.btn-link {
  background: none; border: none; cursor: pointer; font-family: var(--font);
  color: var(--accent-text); font-size: 14px; font-weight: 600; padding: 0;
}
.btn-link:hover { text-decoration: underline; }

.lang-btn {
  background: var(--surface); border: 1px solid var(--border); cursor: pointer;
  padding: 6px 11px; border-radius: var(--radius); font-size: 13px; font-weight: 700;
  color: var(--text-2); display: flex; align-items: center; gap: 5px; font-family: var(--font);
  transition: background 0.15s;
}
.lang-btn:hover { background: var(--surface2); }

.btn-generate {
  background: var(--grad); color: #fff; border: none; cursor: pointer;
  padding: 14px 32px; border-radius: 30px; font-size: 16px; font-weight: 700;
  font-family: var(--font); display: inline-flex; align-items: center; gap: 9px;
  box-shadow: 0 4px 20px rgba(37,99,235,0.35);
  transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
}
.btn-generate:hover { opacity: 0.92; box-shadow: 0 6px 28px rgba(37,99,235,0.4); transform: translateY(-1px); }
.btn-generate:active { transform: scale(0.98); }
.btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-generate .ti-loader-2 { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== HEADER NAV ICONS ===== */
.saved-btn {
  background: none; border: 1px solid var(--border); cursor: pointer;
  width: 38px; height: 38px; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); font-size: 18px; position: relative;
  transition: background 0.15s;
}
.saved-btn:hover { background: var(--surface2); }
.badge {
  position: absolute; top: -5px; right: -5px;
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700; min-width: 17px; height: 17px;
  border-radius: 99px; display: flex; align-items: center; justify-content: center;
  padding: 0 4px; border: 2px solid var(--bg);
}
.avatar-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--grad); color: #fff;
  border: none; cursor: pointer; font-weight: 800; font-size: 14px;
  font-family: var(--font); display: flex; align-items: center; justify-content: center;
}

/* ===== PAGES ===== */
.page { display: none; padding: 36px 0 80px; }
.page.active { display: block; }

/* ===== HERO ===== */
.hero {
  text-align: center; padding: 12px 0 36px;
}
.hero-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 14px;
}
.hero-title {
  font-size: clamp(32px, 5vw, 48px); font-weight: 900;
  color: var(--text); letter-spacing: -1.2px; line-height: 1.1;
  margin-bottom: 14px;
}
.hero-sub {
  font-size: 16px; color: var(--text-2); max-width: 460px;
  margin: 0 auto 28px; line-height: 1.65;
}

/* ===== CATEGORY STRIP ===== */
.category-strip {
  display: flex; gap: 8px; flex-wrap: wrap;
  justify-content: center; margin-bottom: 28px;
}
.cat-pill {
  padding: 7px 15px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border); background: var(--surface);
  color: var(--text-2); display: flex; align-items: center; gap: 6px;
  font-family: var(--font); transition: all 0.15s;
}
.cat-pill:hover { border-color: var(--border-strong); background: var(--surface2); }
.cat-pill.active {
  background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text);
}

/* ===== CARDS ===== */
.cards-list { display: flex; flex-direction: column; gap: 14px; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 22px 24px;
  box-shadow: var(--shadow);
  animation: cardIn 0.3s ease;
  transition: border-color 0.3s, box-shadow 0.2s;
}
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.09); }
.card.fresh { border-color: var(--accent-border); }
@keyframes cardIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 10px; }
.card-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.badge-pill {
  font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px;
  display: inline-flex; align-items: center; gap: 4px; border: 1px solid transparent;
}
.badge-science { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
.badge-art { background: var(--pink-bg); color: var(--pink-text); border-color: var(--pink-border); }
.badge-history { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
.badge-philosophy { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-border); }
.badge-nature { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
.badge-verified { background: var(--success-bg); color: var(--success-text); border-color: var(--success-border); }
.badge-new { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent-border); }

.card-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
  background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-3); transition: all 0.15s;
}
.icon-btn:hover { border-color: var(--border-strong); color: var(--text-2); background: var(--surface2); }
.icon-btn.liked { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }
.icon-btn.saved { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text); }

.card-title {
  font-size: 19px; font-weight: 800; color: var(--text);
  letter-spacing: -0.4px; line-height: 1.3; margin-bottom: 10px;
}
.card-content {
  font-size: 15px; color: var(--text-2); line-height: 1.75;
  margin-bottom: 16px;
}
.card-content.clamped {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.card-author { font-size: 13px; color: var(--text-3); font-style: italic; }

.card-foot-actions { display: flex; gap: 8px; align-items: center; }
.sources-btn {
  font-size: 12px; font-weight: 700; padding: 4px 11px; border-radius: 99px;
  border: 1px solid var(--border); background: none; cursor: pointer; color: var(--text-3);
  display: inline-flex; align-items: center; gap: 5px; font-family: var(--font);
  transition: all 0.15s;
}
.sources-btn:hover, .sources-btn.open { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text); }
.read-more-btn {
  font-size: 13px; font-weight: 600; color: var(--accent-text); background: none;
  border: none; cursor: pointer; font-family: var(--font); padding: 0;
}
.read-more-btn:hover { text-decoration: underline; }

.sources-list {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px;
}
.source-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--accent-text); text-decoration: none; font-weight: 500;
}
.source-link:hover { text-decoration: underline; }

/* ===== EMPTY ===== */
.empty {
  text-align: center; padding: 70px 20px; color: var(--text-3);
}
.empty i { font-size: 44px; display: block; margin-bottom: 14px; }
.empty p { font-size: 15px; }

/* ===== PAGE HEADER ===== */
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
.page-title { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
.page-sub { font-size: 14px; color: var(--text-3); margin-top: 3px; }

/* ===== PROFILE ===== */
.profile-hero { display: flex; align-items: center; gap: 18px; margin-bottom: 32px; }
.avatar-lg {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--grad); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 900; flex-shrink: 0;
}
.profile-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.profile-since { font-size: 13px; color: var(--text-3); margin-top: 3px; }

.tab-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab {
  background: none; border: none; cursor: pointer; font-family: var(--font);
  padding: 10px 18px; font-size: 14px; font-weight: 600;
  color: var(--text-3); border-bottom: 2.5px solid transparent; margin-bottom: -1px;
  transition: color 0.15s;
}
.tab:hover { color: var(--text-2); }
.tab.active { color: var(--accent-text); border-bottom-color: var(--accent); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.info-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
}
.info-row:last-child { border-bottom: none; }
.info-label { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text-2); }
.info-label i { font-size: 17px; color: var(--text-3); }
.info-value { font-size: 14px; font-weight: 600; color: var(--text); }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-card {
  border-radius: var(--radius-lg); padding: 20px; border: 1px solid transparent;
}
.stat-card i { font-size: 24px; display: block; margin-bottom: 10px; }
.stat-num { font-size: 32px; font-weight: 900; line-height: 1; }
.stat-label { font-size: 13px; margin-top: 5px; opacity: 0.8; }
.stat-blue { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent-text); }
.stat-purple { background: var(--purple-bg); border-color: var(--purple-border); color: var(--purple-text); }
.stat-red { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }
.stat-green { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }

.settings-block {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 22px; margin-bottom: 12px;
}
.settings-block h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

/* ===== INPUTS ===== */
.input {
  width: 100%; padding: 11px 14px; border-radius: var(--radius);
  border: 1px solid var(--border-strong); font-size: 15px; font-family: var(--font);
  background: var(--surface); color: var(--text); outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  margin-bottom: 12px;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
.input::placeholder { color: var(--text-3); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 500; padding: 20px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.modal {
  background: var(--surface); border-radius: 20px;
  padding: 36px 32px; width: 100%; max-width: 420px;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn { from { opacity:0; transform:scale(0.93) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }

.modal-logo { display: flex; justify-content: center; margin-bottom: 20px; }
.modal-title { font-size: 22px; font-weight: 800; text-align: center; letter-spacing: -0.4px; margin-bottom: 6px; }
.modal-sub { font-size: 14px; color: var(--text-3); text-align: center; margin-bottom: 24px; }

.auth-error {
  background: var(--danger-bg); border: 1px solid var(--danger-border);
  color: var(--danger-text); padding: 10px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; margin-bottom: 16px;
}
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
#forgotRow { margin-bottom: 8px; }
.auth-switch { text-align: center; font-size: 14px; color: var(--text-3); margin-top: 18px; }

.reset-sent {
  background: var(--success-bg); border: 1px solid var(--success-border);
  color: var(--success-text); padding: 12px 16px; border-radius: var(--radius);
  font-size: 14px; display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; font-weight: 500;
}
.reset-sent i { font-size: 20px; flex-shrink: 0; }

/* ===== RESPONSIVE ===== */
@media (max-width: 520px) {
  .logo-text { display: none; }
  .hero-title { font-size: 28px; }
  .card { padding: 18px; }
  .modal { padding: 28px 20px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .header-inner { padding: 0 14px; }
  .container { padding: 0 14px; }
}

</style>
</head>
<body>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <button class="logo-btn" onclick="showPage('home')">
      <div class="logo-icon"><i class="ti ti-sparkles"></i></div>
      <span class="logo-text">MindSpark Daily</span>
    </button>
    <nav class="header-nav">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">
        <i class="ti ti-language"></i>
        <span id="langLabel">EN</span>
      </button>
      <div id="navGuest" class="nav-group">
        <button class="btn-outline" onclick="openAuth('login')" id="btnSignIn">Увійти</button>
        <button class="btn-primary" onclick="openAuth('register')" id="btnSignUp">Реєстрація</button>
      </div>
      <div id="navUser" class="nav-group hidden">
        <button class="saved-btn" onclick="showPage('saved')" id="savedBtn">
          <i class="ti ti-bookmark"></i>
          <span id="savedCount" class="badge hidden">0</span>
        </button>
        <button class="avatar-btn" onclick="showPage('profile')" id="avatarBtn">A</button>
      </div>
    </nav>
  </div>
</header>

<!-- PAGE: HOME -->
<main id="pageHome" class="page active">
  <div class="container">
    <section class="hero">
      <p class="hero-eyebrow" id="heroEyebrow">Щоденна доза натхнення</p>
      <h1 class="hero-title" id="heroTitle">Живи цікавіше</h1>
      <p class="hero-sub" id="heroSub">Перевірені наукові факти, мудрість і відкриття великих мислителів.</p>
      <button class="btn-generate" id="btnGenerate" onclick="generateCard()">
        <i class="ti ti-sparkles" id="generateIcon"></i>
        <span id="generateLabel">Згенерувати інсайт</span>
      </button>
    </section>

    <div class="category-strip" id="categoryStrip"></div>

    <div class="cards-list" id="cardsList"></div>
  </div>
</main>

<!-- PAGE: SAVED -->
<main id="pageSaved" class="page">
  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-title" id="savedTitle">Збережені</h1>
        <p class="page-sub" id="savedSub">0 інсайтів</p>
      </div>
      <button class="btn-back" onclick="showPage('home')"><i class="ti ti-arrow-left"></i></button>
    </div>
    <div class="cards-list" id="savedList"></div>
  </div>
</main>

<!-- PAGE: PROFILE -->
<main id="pageProfile" class="page">
  <div class="container" style="max-width:600px">
    <div class="profile-hero">
      <div class="avatar-lg" id="profileAvatar">A</div>
      <div>
        <h1 class="profile-name" id="profileName">Користувач</h1>
        <p class="profile-since" id="profileSince"></p>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-tab="info" onclick="switchTab('info')" id="tabInfo">Інфо</button>
      <button class="tab" data-tab="stats" onclick="switchTab('stats')" id="tabStats">Статистика</button>
      <button class="tab" data-tab="settings" onclick="switchTab('settings')" id="tabSettings">Налаштування</button>
    </div>
    <div id="tabPanelInfo" class="tab-panel active">
      <div class="info-card" id="infoCard"></div>
    </div>
    <div id="tabPanelStats" class="tab-panel">
      <div class="stats-grid" id="statsGrid"></div>
    </div>
    <div id="tabPanelSettings" class="tab-panel">
      <div class="settings-block">
        <h3 id="settingsNameLabel">Оновити ім'я</h3>
        <input type="text" id="editNameInput" class="input" />
        <button class="btn-primary" onclick="saveName()" id="btnSaveName">Зберегти</button>
      </div>
      <button class="btn-danger" onclick="logout()" id="btnLogout">
        <i class="ti ti-logout"></i>
        <span id="signOutLabel">Вийти</span>
      </button>
    </div>
  </div>
</main>

<!-- MODAL: AUTH -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeAuthIfOutside(event)">
  <div class="modal">
    <div class="modal-logo">
      <div class="logo-icon large"><i class="ti ti-sparkles"></i></div>
    </div>
    <h2 class="modal-title" id="modalTitle">Ласкаво просимо</h2>
    <p class="modal-sub" id="modalSub">Увійдіть у свій акаунт</p>

    <div id="authError" class="auth-error hidden"></div>

    <div id="fieldName" class="field hidden">
      <label id="labelName">Ім'я</label>
      <input type="text" id="inputName" class="input" placeholder="Ваше ім'я" />
    </div>
    <div class="field">
      <label id="labelEmail">Електронна пошта</label>
      <input type="email" id="inputEmail" class="input" placeholder="name@email.com" />
    </div>
    <div id="fieldPassword" class="field">
      <label id="labelPassword">Пароль</label>
      <input type="password" id="inputPassword" class="input" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()" />
    </div>
    <div id="fieldConfirm" class="field hidden">
      <label id="labelConfirm">Підтвердіть пароль</label>
      <input type="password" id="inputConfirm" class="input" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()" />
    </div>
    <div id="forgotRow">
      <button class="btn-link" onclick="switchForgot()" id="forgotLink">Забули пароль?</button>
    </div>

    <!-- forgot email field (hidden by default) -->
    <div id="fieldResetEmail" class="field hidden">
      <label id="labelResetEmail">Електронна пошта</label>
      <input type="email" id="inputResetEmail" class="input" placeholder="name@email.com" />
    </div>
    <div id="resetSentMsg" class="reset-sent hidden">
      <i class="ti ti-mail-check"></i>
      <span id="resetSentText">Якщо цей email зареєстровано, посилання надіслано.</span>
    </div>

    <button class="btn-primary full" onclick="submitAuth()" id="authSubmitBtn">Увійти</button>
    <p class="auth-switch" id="authSwitch">
      Немає акаунту? <button class="btn-link" onclick="switchAuthMode()" id="authSwitchBtn">Реєстрація</button>
    </p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
