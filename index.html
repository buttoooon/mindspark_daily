<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindSpark Daily</title>
  <meta name="description" content="Щоденна доза натхнення — перевірені наукові факти, мудрість і відкриття великих мислителів." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <button class="logo-btn" onclick="showPage('home')">
      <div class="logo-icon"><i class="ti ti-sparkles"></i></div>
      <span class="logo-text">MindSpark Daily</span>
    </button>
    <nav class="header-nav">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">
        <i class="ti ti-language"></i>
        <span id="langLabel">EN</span>
      </button>
      <div id="navGuest" class="nav-group">
        <button class="btn-outline" onclick="openAuth('login')" id="btnSignIn">Увійти</button>
        <button class="btn-primary" onclick="openAuth('register')" id="btnSignUp">Реєстрація</button>
      </div>
      <div id="navUser" class="nav-group hidden">
        <button class="saved-btn" onclick="showPage('saved')" id="savedBtn">
          <i class="ti ti-bookmark"></i>
          <span id="savedCount" class="badge hidden">0</span>
        </button>
        <button class="avatar-btn" onclick="showPage('profile')" id="avatarBtn">A</button>
      </div>
    </nav>
  </div>
</header>

<!-- PAGE: HOME -->
<main id="pageHome" class="page active">
  <div class="container">
    <section class="hero">
      <p class="hero-eyebrow" id="heroEyebrow">Щоденна доза натхнення</p>
      <h1 class="hero-title" id="heroTitle">Живи цікавіше</h1>
      <p class="hero-sub" id="heroSub">Перевірені наукові факти, мудрість і відкриття великих мислителів.</p>
      <button class="btn-generate" id="btnGenerate" onclick="generateCard()">
        <i class="ti ti-sparkles" id="generateIcon"></i>
        <span id="generateLabel">Згенерувати інсайт</span>
      </button>
    </section>

    <div class="category-strip" id="categoryStrip"></div>

    <div class="cards-list" id="cardsList"></div>
  </div>
</main>

<!-- PAGE: SAVED -->
<main id="pageSaved" class="page">
  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-title" id="savedTitle">Збережені</h1>
        <p class="page-sub" id="savedSub">0 інсайтів</p>
      </div>
      <button class="btn-back" onclick="showPage('home')"><i class="ti ti-arrow-left"></i></button>
    </div>
    <div class="cards-list" id="savedList"></div>
  </div>
</main>

<!-- PAGE: PROFILE -->
<main id="pageProfile" class="page">
  <div class="container" style="max-width:600px">
    <div class="profile-hero">
      <div class="avatar-lg" id="profileAvatar">A</div>
      <div>
        <h1 class="profile-name" id="profileName">Користувач</h1>
        <p class="profile-since" id="profileSince"></p>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-tab="info" onclick="switchTab('info')" id="tabInfo">Інфо</button>
      <button class="tab" data-tab="stats" onclick="switchTab('stats')" id="tabStats">Статистика</button>
      <button class="tab" data-tab="settings" onclick="switchTab('settings')" id="tabSettings">Налаштування</button>
    </div>
    <div id="tabPanelInfo" class="tab-panel active">
      <div class="info-card" id="infoCard"></div>
    </div>
    <div id="tabPanelStats" class="tab-panel">
      <div class="stats-grid" id="statsGrid"></div>
    </div>
    <div id="tabPanelSettings" class="tab-panel">
      <div class="settings-block">
        <h3 id="settingsNameLabel">Оновити ім'я</h3>
        <input type="text" id="editNameInput" class="input" />
        <button class="btn-primary" onclick="saveName()" id="btnSaveName">Зберегти</button>
      </div>
      <button class="btn-danger" onclick="logout()" id="btnLogout">
        <i class="ti ti-logout"></i>
        <span id="signOutLabel">Вийти</span>
      </button>
    </div>
  </div>
</main>

<!-- MODAL: AUTH -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeAuthIfOutside(event)">
  <div class="modal">
    <div class="modal-logo">
      <div class="logo-icon large"><i class="ti ti-sparkles"></i></div>
    </div>
    <h2 class="modal-title" id="modalTitle">Ласкаво просимо</h2>
    <p class="modal-sub" id="modalSub">Увійдіть у свій акаунт</p>

    <div id="authError" class="auth-error hidden"></div>

    <div id="fieldName" class="field hidden">
      <label id="labelName">Ім'я</label>
      <input type="text" id="inputName" class="input" placeholder="Ваше ім'я" />
    </div>
    <div class="field">
      <label id="labelEmail">Електронна пошта</label>
      <input type="email" id="inputEmail" class="input" placeholder="name@email.com" />
    </div>
    <div id="fieldPassword" class="field">
      <label id="labelPassword">Пароль</label>
      <input type="password" id="inputPassword" class="input" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()" />
    </div>
    <div id="fieldConfirm" class="field hidden">
      <label id="labelConfirm">Підтвердіть пароль</label>
      <input type="password" id="inputConfirm" class="input" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()" />
    </div>
    <div id="forgotRow">
      <button class="btn-link" onclick="switchForgot()" id="forgotLink">Забули пароль?</button>
    </div>

    <!-- forgot email field (hidden by default) -->
    <div id="fieldResetEmail" class="field hidden">
      <label id="labelResetEmail">Електронна пошта</label>
      <input type="email" id="inputResetEmail" class="input" placeholder="name@email.com" />
    </div>
    <div id="resetSentMsg" class="reset-sent hidden">
      <i class="ti ti-mail-check"></i>
      <span id="resetSentText">Якщо цей email зареєстровано, посилання надіслано.</span>
    </div>

    <button class="btn-primary full" onclick="submitAuth()" id="authSubmitBtn">Увійти</button>
    <p class="auth-switch" id="authSwitch">
      Немає акаунту? <button class="btn-link" onclick="switchAuthMode()" id="authSwitchBtn">Реєстрація</button>
    </p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
